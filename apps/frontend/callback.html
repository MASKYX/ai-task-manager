<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Callback</title>
</head>
<body>
    <p>Signing in...</p>

    <script type="module">
        import { userManager } from "./src/main.ts";

        async function handleCallback() {
            try {
                await userManager.signinCallback();
                window.location.replace("/index.html");
            } catch (err) {
                document.body.innerHTML = `<pre>Login callback failed:\n${String(err)}</pre>`;
            }
        }

        handleCallback();
    </script>
</body>
</html>
